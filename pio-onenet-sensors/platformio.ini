[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = COM3
monitor_port = COM3
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = direct
upload_speed = 460800
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  adafruit/Adafruit AHTX0 @ ^2.0.5
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.0.4

; If your ESP32-C3 Super Mini variant needs a different board profile,
; you can switch `board` to another ESP32-C3 board supported by PlatformIO.
; Most ESP32-C3 SuperMini boards expose logs over the native USB CDC port,
; so we enable CDC on boot to make `Serial` appear on the USB monitor.
